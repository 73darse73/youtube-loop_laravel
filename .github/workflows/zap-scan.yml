name: Security Scan (OWASP ZAP)

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜0時
  workflow_dispatch:  # 手動実行も可能

jobs:
  zap_scan:
    runs-on: ubuntu-latest
    steps:
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'https://loop-video.com'
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a'
          fail_action: false
